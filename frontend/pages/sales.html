<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS - Sales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-md-block sidebar py-3">
      <ul class="nav flex-column px-2">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="suppliers.html">Suppliers</a></li>
        <li class="nav-item"><a class="nav-link active" href="sales.html">Sales</a></li>
      </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-md-4 py-4">
      <h2 class="mb-3">Sales</h2>
      <form id="saleForm" class="row g-2 mb-3">
        <div class="col-md-3"><input id="product_id" type="number" min="1" class="form-control" placeholder="Product ID" required></div>
        <div class="col-md-3"><input id="quantity" type="number" min="1" class="form-control" placeholder="Quantity" required></div>
        <div class="col-md-2"><button class="btn btn-dark w-100" type="submit">Create Sale</button></div>
      </form>
      <div class="table-responsive">
        <table class="table table-striped">
          <thead><tr><th>ID</th><th>Product ID</th><th>Quantity</th><th>Total Price</th><th>Date</th></tr></thead>
          <tbody id="salesRows"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  async function loadSales() {
    const sales = await apiRequest("/api/sales");
    document.getElementById("salesRows").innerHTML = sales.map((s) => `
      <tr><td>${s.id}</td><td>${s.product_id}</td><td>${s.quantity}</td><td>${s.total_price}</td><td>${new Date(s.created_at).toLocaleString()}</td></tr>
    `).join("");
  }

  document.getElementById("saleForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    await apiRequest("/api/sales", {
      method: "POST",
      body: JSON.stringify({
        product_id: Number(product_id.value),
        quantity: Number(quantity.value),
      }),
    });
    e.target.reset();
    loadSales().catch((err) => alert(err.message));
  });

  loadSales().catch((err) => alert(err.message));
</script>
</body>
</html>
