<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-md-block sidebar py-3">
      <ul class="nav flex-column px-2">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="suppliers.html">Suppliers</a></li>
        <li class="nav-item"><a class="nav-link" href="sales.html">Sales</a></li>
      </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-md-4 py-4">
      <h2 class="mb-4">Dashboard</h2>
      <div class="row g-3" id="cards"></div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  async function loadDashboard() {
    const data = await apiRequest("/api/dashboard/summary");
    const cards = [
      ["Total Products", data.total_products],
      ["Total Sales", `$${data.total_sales}`],
      ["Low Stock Products", data.low_stock_products],
      ["Total Suppliers", data.total_suppliers],
    ];

    document.getElementById("cards").innerHTML = cards.map(([label, value]) => `
      <div class="col-md-3">
        <div class="card card-stat p-3">
          <h6>${label}</h6>
          <h3>${value}</h3>
        </div>
      </div>
    `).join("");
  }

  loadDashboard().catch((err) => alert(err.message));
</script>
</body>
</html>
