<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS - Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="mb-3">Add Product</h2>
      <form id="productForm" class="card card-body">
        <div class="row g-3">
          <div class="col-md-6"><input id="name" class="form-control" placeholder="Name" required></div>
          <div class="col-md-6"><input id="category" class="form-control" placeholder="Category" required></div>
          <div class="col-md-4"><input id="quantity" type="number" min="0" class="form-control" placeholder="Quantity" required></div>
          <div class="col-md-4"><input id="price" type="number" min="0.01" step="0.01" class="form-control" placeholder="Price" required></div>
          <div class="col-md-4"><input id="supplier_id" type="number" min="1" class="form-control" placeholder="Supplier ID" required></div>
        </div>
        <button class="btn btn-dark mt-3" type="submit">Save Product</button>
      </form>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      await apiRequest("/api/products", {
        method: "POST",
        body: JSON.stringify({
          name: name.value,
          category: category.value,
          quantity: Number(quantity.value),
          price: Number(price.value),
          supplier_id: Number(supplier_id.value),
        }),
      });
      window.location.href = "products.html";
    } catch (err) {
      alert(err.message);
    }
  });
</script>
</body>
</html>
