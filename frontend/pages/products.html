<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS - Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid product-page">
  <div class="row">
    <nav class="col-md-2 d-md-block sidebar py-3">
      <ul class="nav flex-column px-2">
        <li class="nav-item"><a class="nav-link" data-nav="dashboard" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" data-nav="products" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" data-nav="suppliers" href="suppliers.html">Sellers</a></li>
        <li class="nav-item"><a class="nav-link" data-nav="sales" href="sales.html">Sales</a></li>
      </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-md-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title">Products</h2>
        <div class="d-flex align-items-center gap-2">
          <span id="sessionUser" class="text-muted"></span>
          <a class="btn btn-dark" href="add-product.html" data-admin-only>Add Product</a>
          <button class="btn btn-outline-dark btn-sm" onclick="logout()">Logout</button>
        </div>
      </div>
      <input class="form-control mb-3 product-search" id="search" placeholder="Search by product name">
      <div class="table-responsive product-table-wrap">
        <table class="table table-striped product-table">
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Price</th><th>Supplier ID</th><th data-admin-only>Actions</th></tr></thead>
          <tbody id="productRows"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  const session = setupPage("products");

  async function loadProducts(search = "") {
    const query = search ? `?search=${encodeURIComponent(search)}` : "";
    const products = await apiRequest(`/api/products${query}`);
    document.getElementById("productRows").innerHTML = products.map((p) => `
      <tr>
        <td>${p.id}</td><td>${p.name}</td><td>${p.category}</td><td>${p.quantity}</td><td>${p.price}</td><td>${p.supplier_id}</td>
        ${session.role === "admin"
          ? `<td>
               <button class="btn btn-sm btn-outline-dark me-1" onclick="editProduct(${p.id}, '${encodeURIComponent(p.name)}', '${encodeURIComponent(p.category)}', ${p.quantity}, ${p.price}, ${p.supplier_id})">Edit</button>
               <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
             </td>`
          : ""}
      </tr>`).join("");
  }

  async function editProduct(id, encodedName, encodedCategory, quantity, price, supplierId) {
    const name = prompt("Product name", decodeURIComponent(encodedName));
    if (!name) return;
    const category = prompt("Category", decodeURIComponent(encodedCategory));
    if (!category) return;
    const nextQuantity = Number(prompt("Quantity", quantity));
    if (Number.isNaN(nextQuantity)) return;
    const nextPrice = Number(prompt("Price", price));
    if (Number.isNaN(nextPrice)) return;
    const nextSupplierId = Number(prompt("Supplier ID", supplierId));
    if (Number.isNaN(nextSupplierId)) return;

    await apiRequest(`/api/products/${id}`, {
      method: "PUT",
      body: JSON.stringify({
        name,
        category,
        quantity: nextQuantity,
        price: nextPrice,
        supplier_id: nextSupplierId,
      }),
    });
    loadProducts(searchInput.value).catch((err) => alert(err.message));
  }

  async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    await apiRequest(`/api/products/${id}`, { method: "DELETE" });
    loadProducts(searchInput.value).catch((err) => alert(err.message));
  }

  const searchInput = document.getElementById("search");
  searchInput.addEventListener("input", (e) => loadProducts(e.target.value).catch((err) => alert(err.message)));
  loadProducts().catch((err) => alert(err.message));
</script>
</body>
</html>
