<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMS - Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-md-block sidebar py-3">
      <ul class="nav flex-column px-2">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="suppliers.html">Suppliers</a></li>
        <li class="nav-item"><a class="nav-link" href="sales.html">Sales</a></li>
      </ul>
    </nav>
    <main class="col-md-10 ms-sm-auto px-md-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Products</h2>
        <a class="btn btn-dark" href="add-product.html">Add Product</a>
      </div>
      <input class="form-control mb-3" id="search" placeholder="Search by product name">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Price</th><th>Supplier ID</th></tr></thead>
          <tbody id="productRows"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  async function loadProducts(search = "") {
    const query = search ? `?search=${encodeURIComponent(search)}` : "";
    const products = await apiRequest(`/api/products${query}`);
    document.getElementById("productRows").innerHTML = products.map((p) => `
      <tr>
        <td>${p.id}</td><td>${p.name}</td><td>${p.category}</td><td>${p.quantity}</td><td>${p.price}</td><td>${p.supplier_id}</td>
      </tr>`).join("");
  }

  const searchInput = document.getElementById("search");
  searchInput.addEventListener("input", (e) => loadProducts(e.target.value).catch((err) => alert(err.message)));
  loadProducts().catch((err) => alert(err.message));
</script>
</body>
</html>
